<!DOCTYPE html>
<html>
  
<head>
<link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
<title>Portifólio para a Fundação João Pinheiro</title>
</head>

<style>
body, html {
  height: 100%;
  margin: 0;
}

a {
  font-family: "Montserrat";
}

.bgimg {
  height: 100%;
  background-position: center;
  background-size: cover;
  background-color: #2f3d4c;
  position: relative;
  color: white;
  font-family: "Montserrat";
  font-size: 22px;
}

.topleft {
  position: absolute;
  top: 0;
  left: 16px;
}

.bottomright {
  position: absolute;
  bottom: 0;
  right: 16px;
}

.middle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

hr {
  margin: auto;
  width: 40%;
}

button{
	margin: 20px;
	padding: 40px 80px;
	border: none;
	cursor: pointer;
}

/* PIERWSZY SPOSOB WYKORZYSTANIE CIENIA */
.first{
	background: #19c3d6;
	box-shadow: inset 0px 0px 0px 0px #ff0099;
	transition: all 0.5s ease-in-out;
}
.first:hover{
	box-shadow: inset 0px -200px 0px 0px #ff0099;
}

/* DRUGI SPOSOB DLUZSZY ALE BARDZIEJ UNIWERSALNY*/
.sec{
	background: none;
	position: relative;
	overflow: hidden;
}

.sec:before, .sec:after{
	content: "";
	background: #19c3d6;
	display: block;
	position: absolute;
	left: 0;
	right: 0;
	top: 0;
	bottom: 0;
	z-index: -2;
}
.sec:after{
	background: #ff0099;
	top: 100%;
	transition: all 0.5s ease-in-out;
}
.sec:hover:after{
	top: 0;
}
</style>
<body>
<div class="bgimg">
  <div class="topleft">
    <p>Portifólio para a Fundação João Pinheiro</p>
  </div>
  <div class="middle">
    <p>Caros,</p> 
    <p>Organizei esse portifólio para mostrar para vocês um pouco da minha experiência com análise de dados. Basta clicar nos links para serem redirecionados para cada um dos scripts.</p>
    <p>Forte abraço.</p>
    <hr>
    <a href="https://lucastbrito.github.io/fjp/scripts/script1.html" target="_blank"><button class="first">1º Script, em Python</button></a>
    <a href="https://lucastbrito.github.io/fjp/scripts/script2.html" target="_blank"><button class="sec">2º Script, em R</button></a>
  </div>
  <div class="bottomright">
    <p>Por Lucas Tavares Brito</p>
  </div>
</div>

</body>
</html>
